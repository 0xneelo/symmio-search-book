name: Search Book Launch Evidence

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/search-book-launch-evidence.yml"
      - "scripts/**"
      - "data/**"
      - "content/**"
      - "index.html"
      - "package.json"
      - "README.md"
      - "DEPLOYMENT.md"

permissions:
  contents: read

concurrency:
  group: search-book-launch-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launch-evidence:
    name: Build no-secret launch evidence packet
    runs-on: ubuntu-latest
    env:
      VIBE_DOCS_ROOT: /tmp/vibe_docs
      VIBE_DOCS_PUBLIC: /tmp/vibe_docs/Docs/public
      VIBE_DOCS_DATA: /tmp/vibe_docs/Website/public/generated/docs-data.json
      SEARCH_BOOK_LAUNCH_EVIDENCE_DIR: /tmp/search-book-launch-evidence
    steps:
      - name: Check out Search Book
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show runtime
        run: |
          node --version
          npm --version

      - name: Fetch public Vibe docs export
        run: |
          git clone --depth 1 https://github.com/0xneelo/vibe_docs.git "$VIBE_DOCS_ROOT"
          test -d "$VIBE_DOCS_PUBLIC"
          test -f "$VIBE_DOCS_DATA"

      - name: Build launch evidence packet
        run: |
          npm run search-book:launch-evidence -- --out-dir "$SEARCH_BOOK_LAUNCH_EVIDENCE_DIR"

      - name: Check packet files
        run: |
          test -f "$SEARCH_BOOK_LAUNCH_EVIDENCE_DIR/launch-evidence.json"
          test -f "$SEARCH_BOOK_LAUNCH_EVIDENCE_DIR/launch-evidence.md"
          npm run search-book:check-launch-evidence-packet -- --packet "$SEARCH_BOOK_LAUNCH_EVIDENCE_DIR/launch-evidence.json"

      - name: Summarize launch evidence
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import path from "node:path";

          const packetPath = path.join(process.env.SEARCH_BOOK_LAUNCH_EVIDENCE_DIR, "launch-evidence.json");
          const packet = JSON.parse(fs.readFileSync(packetPath, "utf8"));
          const launch = packet.launchEvidence?.parsed?.evidence?.launchReadiness || packet.launchEvidence?.parsed || {};
          const monitoring = packet.monitoringEvidence?.parsed || {};
          const sourceFreshness = packet.sourceFreshnessEvidence?.parsed || {};
          const statusEvidence = packet.statusEvidence?.parsed || {};
          const discord = packet.discordReviewArtifacts?.parsed || {};
          const discordSummary = discord.summary || {};
          const routeCoverage = discordSummary.routeCoverage || {};
          const queue = discord.editorialQueue || {};
          const statusDocuments = statusEvidence.documents || [];
          const passedStatusDocuments = statusDocuments.filter((doc) => doc.passed).length;
          const openOperatorItems = (statusEvidence.evidence?.openOperatorItems || packet.readiness?.openOperatorItems || [])
            .map((item) => typeof item === "object" ? `#${item.id}` : `#${item}`)
            .join(", ") || "none";
          const markdown = `## Search Book Launch Evidence

          | Check | Value |
          | --- | --- |
          | Packet status | \`${packet.status || "missing"}\` |
          | Launch status | \`${launch.status || "missing"}\` |
          | Monitoring status | \`${monitoring.status || "missing"}\` |
          | Source freshness | \`${sourceFreshness.status || "missing"}\` (${sourceFreshness.totals?.passed ?? 0}/${sourceFreshness.totals?.checks ?? 0} checks; source bodies printed: \`${sourceFreshness.secrets?.sourceBodiesPrinted ?? false}\`) |
          | Status evidence | \`${statusEvidence.status || "missing"}\` (${passedStatusDocuments}/${statusDocuments.length} documents) |
          | Discord review artifacts | \`${discord.status || "missing"}\` |
          | Discord routed items | \`${discordSummary.routedItems ?? "unknown"}\` |
          | Discord route coverage | \`${routeCoverage.coveredPageFitGroups ?? "unknown"}/${routeCoverage.totalPageFitGroups ?? "unknown"} page-fit groups\` |
          | Discord editorial queue | \`${queue.pageFitReviewReady ?? "unknown"} page-fit groups / ${queue.refusalReviewReady ?? "unknown"} refusals\` |
          | Discord leakage checks | raw keys \`${discordSummary.rawKeyHits ?? "unknown"}\`, sample leaks \`${discordSummary.sampleLeaks ?? "unknown"}\`, queue raw tables \`${queue.rawTableHits ?? "unknown"}\` |
          | Open operator items | \`${openOperatorItems}\` |
          | Secrets printed | \`${packet.secrets?.valuesPrinted ?? false}\` |
          `;

          if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${markdown}\n`);
          console.log(markdown);
          NODE

      - name: Upload launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-book-launch-evidence
          path: |
            /tmp/search-book-launch-evidence/launch-evidence.json
            /tmp/search-book-launch-evidence/launch-evidence.md
          if-no-files-found: warn
          retention-days: 14
